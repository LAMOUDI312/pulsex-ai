<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulseX AI - CMC Live Signals</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header{
  background:black;
  padding:18px;
  text-align:center;
  color:#00ff88;
  font-size:20px;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:#141a2b;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
}

.green{color:#00ff88;}
.orange{color:orange;}
.red{color:#ff4d4d;}
.small{color:gray;font-size:12px;}
</style>
</head>

<body>

<header>
PulseX AI 🚀 CoinMarketCap Live Signals
</header>

<div class="container" id="app">Loading data...</div>

<script>

const coins = ["WAI","SENTIS","WBAI","ST","TA","TTD"];

// CoinMarketCap API (requires key)
const API_KEY = "YOUR_API_KEY_HERE";

async function fetchPrice(symbol){

  try{
    const res = await fetch(`https://pro-api.coinmarketcap.com/v1/cryptocurrency/quotes/latest?symbol=${symbol}`,{
      headers:{
        "X-CMC_PRO_API_KEY": API_KEY
      }
    });

    const data = await res.json();

    let coin = data.data[symbol];
    let price = coin.quote.USD.price;
    let change = coin.quote.USD.percent_change_24h;

    return {price, change};

  }catch(e){
    return null;
  }
}

async function load(){

  let html="";

  for(let c of coins){

    let data = await fetchPrice(c);

    if(!data){
      html += `<div class="card">
        <b>${c}</b><br>
        ❌ No data found on CoinMarketCap<br>
        <div class="small">Check if symbol exists or API key</div>
      </div>`;
      continue;
    }

    let score = Math.min(100, Math.abs(data.change)*8 + Math.random()*20);

    let entry = (data.price * (1 - Math.random()*0.02)).toFixed(6);
    let target = (data.price * (1 + Math.random()*0.05)).toFixed(6);

    let momentum = "";
    let color = "";

    if(score > 75){
      momentum = "🚀 Strong Momentum";
      color = "green";
    }
    else if(score > 50){
      momentum = "⚡ Watch Zone";
      color = "orange";
    }
    else{
      momentum = "⚠️ Weak Move";
      color = "red";
    }

    html += `
      <div class="card">
        <b>${c}</b><br><br>

        💰 Price: $${data.price.toFixed(6)}<br>
        📊 24h: ${data.change.toFixed(2)}%<br><br>

        📍 Entry: $${entry}<br>
        🎯 Target: $${target}<br><br>

        Score: ${score.toFixed(1)}<br>
        <span class="${color}">${momentum}</span><br><br>

        <div class="small">Live data from CoinMarketCap</div>
      </div>
    `;
  }

  document.getElementById("app").innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
