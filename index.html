<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PulseX AI Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header{
  background:#000;
  padding:18px;
  text-align:center;
  color:#00ff88;
  font-size:22px;
  font-weight:bold;
}

button{
  background:#00ff88;
  border:none;
  padding:10px 15px;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#151a2b;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
}

.green{color:#00ff88;}
.orange{color:orange;}
.red{color:#ff4d4d;}
</style>
</head>

<body>

<header>PulseX AI 🚀 LIVE WEB APP</header>

<div style="text-align:center;">
<button onclick="loadData()">🔄 Refresh Data</button>
</div>

<div class="container" id="coins">Loading...</div>

<script>
async function loadData(){
  document.getElementById("coins").innerHTML = "Loading market data...";

  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=8&page=1");
  const data = await res.json();

  let html="";

  data.forEach(c=>{

    let score = Math.min(100, Math.abs(c.price_change_percentage_24h||0)*6 + (c.total_volume/1e9));

    let signal = "Weak";
    let color = "orange";

    if(score > 80){
      signal = "🚀 Strong Pump";
      color = "green";
    }
    else if(score > 60){
      signal = "⚡ Breakout";
      color = "orange";
    }
    else{
      signal = "⚠️ Weak Movement";
      color = "red";
    }

    html += `
      <div class="card">
        <b>${c.symbol.toUpperCase()}</b><br>
        Price: $${c.current_price}<br>
        Volume: ${c.total_volume}<br>
        Change: ${c.price_change_percentage_24h?.toFixed(2)}%<br>
        Score: ${score.toFixed(1)}<br>
        <span class="${color}">${signal}</span>
      </div>
    `;
  });

  document.getElementById("coins").innerHTML = html;
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
