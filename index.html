<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PulseX AI Pro</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f111a;
      color:white;
    }

    header {
      background:black;
      padding:20px;
      text-align:center;
      color:#00ff88;
      font-size:22px;
      font-weight:bold;
    }

    .container { padding:15px; }

    .card {
      background:#1a1d29;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      border:1px solid #2c2f3a;
    }

    .name { font-size:18px; font-weight:bold; }

    .green { color:#00ff88; }
    .orange { color:orange; }
  </style>
</head>

<body>

<header>
PulseX AI 🚀 LIVE MARKET
</header>

<div class="container" id="coins">
Loading data...
</div>

<script>
async function loadData() {
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=10&page=1");
  const data = await res.json();

  let html = "";

  data.forEach(c => {

    let score = Math.min(100, Math.abs(c.price_change_percentage_24h || 0) * 5 + (c.total_volume / 1e9));

    let signal = "Weak";
    let color = "orange";

    if(score > 80){
      signal = "🚀 Strong Pump";
      color = "green";
    } else if(score > 60){
      signal = "⚡ Breakout";
      color = "orange";
    }

    html += `
      <div class="card">
        <div class="name">${c.symbol.toUpperCase()}</div>
        <div>Price: $${c.current_price}</div>
        <div>Volume: ${c.total_volume}</div>
        <div>Score: ${score.toFixed(1)}</div>
        <div style="color:${color}">${signal}</div>
      </div>
    `;
  });

  document.getElementById("coins").innerHTML = html;
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
