<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PulseX AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f111a;
      color: white;
    }

    header {
      background: black;
      padding: 20px;
      text-align: center;
      color: #00ff88;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1a1d29;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid #2a2f3a;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    .signal {
      color: #00ff88;
      margin-top: 8px;
    }

    .weak {
      color: orange;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin: 20px;
    }
  </style>
</head>

<body>

<header>
  PulseX AI 🚀 Crypto Scanner
</header>

<div class="container">

  <div class="card">
    <div class="title">
      BTC <span>Score: 92</span>
    </div>
    <div class="signal">🚀 Strong Buy Signal</div>
  </div>

  <div class="card">
    <div class="title">
      ETH <span>Score: 84</span>
    </div>
    <div class="signal">⚡ Breakout Expected</div>
  </div>

  <div class="card">
    <div class="title">
      WAI <span>Score: 78</span>
    </div>
    <div class="signal weak">⚠️ Medium Risk / Possible Pump</div>
  </div>

  <div class="card">
    <div class="title">
      SOL <span>Score: 88</span>
    </div>
    <div class="signal">🚀 Momentum Rising</div>
  </div>

</div>

<div class="footer">
  Powered by PulseX AI • Crypto Analysis System
</div>

</body>
</html>
