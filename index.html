<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulseX AI Smart Engine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header{
  background:black;
  padding:18px;
  text-align:center;
  color:#00ff88;
  font-size:20px;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:#141a2b;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
}

.green{color:#00ff88;}
.orange{color:orange;}
.red{color:#ff4d4d;}

.small{color:gray;font-size:12px;}
</style>
</head>

<body>

<header>
PulseX AI 🚀 Smart Market Engine
</header>

<div class="container" id="app">Loading...</div>

<script>

const coins = ["WAI","SENTIS","WBAI","ST","TA","TTD"];

const API = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=100&page=1";

async function load(){

  const res = await fetch(API);
  const data = await res.json();

  let html="";

  coins.forEach(symbol => {

    let coin = data.find(c => c.symbol.toLowerCase() === symbol.toLowerCase());

    if(!coin){
      html += `
        <div class="card">
          <b>${symbol}</b><br>
          ❌ Not found on CoinGecko<br>
          <div class="small">No reliable data available</div>
        </div>`;
      return;
    }

    let change = coin.price_change_percentage_24h || 0;
    let volume = coin.total_volume;

    let momentum = Math.min(100, Math.abs(change)*5 + (volume/1e9));

    let zone = coin.current_price * (1 - 0.03);
    let target = coin.current_price * (1 + 0.06);

    let status = "";
    let color = "";

    if(momentum > 70){
      status = "🚀 High Momentum (Possible Move Soon)";
      color = "green";
    }
    else if(momentum > 50){
      status = "⚡ Watch Zone";
      color = "orange";
    }
    else{
      status = "⚠️ Low Activity";
      color = "red";
    }

    html += `
      <div class="card">
        <b>${coin.symbol.toUpperCase()}</b><br><br>

        💰 Price: $${coin.current_price}<br>
        📊 24h: ${change.toFixed(2)}%<br><br>

        📍 Entry Zone: $${zone.toFixed(6)}<br>
        🎯 Target Zone: $${target.toFixed(6)}<br><br>

        Momentum: ${momentum.toFixed(1)}<br>
        <span class="${color}">${status}</span><br><br>

        <div class="small">Data: CoinGecko • No time prediction (not possible)</div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
