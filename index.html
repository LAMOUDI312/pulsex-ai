<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulseX AI - CoinGecko Live</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header{
  background:black;
  padding:18px;
  text-align:center;
  color:#00ff88;
  font-size:20px;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:#141a2b;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
}

.green{color:#00ff88;}
.orange{color:orange;}
.red{color:#ff4d4d;}

.small{color:gray;font-size:12px;}
</style>
</head>

<body>

<header>
PulseX AI 🚀 CoinGecko Live Signals
</header>

<div class="container" id="app">Loading market data...</div>

<script>

const API = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=50&page=1";

// العملات المطلوبة
const watchlist = ["wai","sentis","wbai","st","ta","ttd"];

async function load(){

  const res = await fetch(API);
  const data = await res.json();

  let html="";

  watchlist.forEach(symbol => {

    let coin = data.find(c => c.symbol.toLowerCase() === symbol);

    if(!coin){
      html += `
        <div class="card">
          <b>${symbol.toUpperCase()}</b><br>
          ❌ Not found on CoinGecko<br>
          <div class="small">May not be listed or symbol is different</div>
        </div>
      `;
      return;
    }

    let change = coin.price_change_percentage_24h || 0;
    let volume = coin.total_volume;

    let score = Math.min(100, Math.abs(change)*6 + (volume/1e9));

    let entry = (coin.current_price * (1 - Math.random()*0.03)).toFixed(6);
    let target = (coin.current_price * (1 + Math.random()*0.06)).toFixed(6);

    let signal = "";
    let color = "";

    if(score > 75){
      signal = "🚀 Strong Momentum Zone";
      color = "green";
    }
    else if(score > 50){
      signal = "⚡ Watch Breakout";
      color = "orange";
    }
    else{
      signal = "⚠️ Weak Movement";
      color = "red";
    }

    html += `
      <div class="card">
        <b>${coin.symbol.toUpperCase()}</b><br><br>

        💰 Price: $${coin.current_price}<br>
        📊 24h: ${change.toFixed(2)}%<br>
        📦 Volume: ${volume.toLocaleString()}<br><br>

        📍 Entry: $${entry}<br>
        🎯 Target: $${target}<br><br>

        Score: ${score.toFixed(1)}<br>
        <span class="${color}">${signal}</span><br><br>

        <div class="small">Live data from CoinGecko</div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
