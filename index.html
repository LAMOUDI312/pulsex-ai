<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PulseX AI Signals</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header{
  background:black;
  padding:20px;
  text-align:center;
  color:#00ff88;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#141a2b;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
}

.green{color:#00ff88;}
.orange{color:orange;}
.red{color:#ff4d4d;}

.small{
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<header>
PulseX AI 🚀 Signal Zones (Educational)
</header>

<div class="container" id="coins">Loading...</div>

<div class="container small">
Signals are based on market volatility & volume (NOT financial advice)
</div>

<script>

async function load(){

  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=10&page=1");
  const data = await res.json();

  let html="";

  data.forEach(c=>{

    let change = c.price_change_percentage_24h || 0;
    let vol = c.total_volume;

    // AI-style scoring (simulation only)
    let score = Math.min(100, Math.abs(change)*6 + (vol/1e9));

    // simulate entry & target zones
    let entry = (c.current_price * (1 - Math.random()*0.03)).toFixed(2);
    let target = (c.current_price * (1 + Math.random()*0.06)).toFixed(2);

    let signal = "";
    let color = "";

    if(score > 80){
      signal = "HIGH MOMENTUM ZONE 🚀";
      color = "green";
    }
    else if(score > 60){
      signal = "WATCH BREAKOUT ⚡";
      color = "orange";
    }
    else{
      signal = "WEAK STRUCTURE ⚠️";
      color = "red";
    }

    html += `
      <div class="card">
        <b>${c.symbol.toUpperCase()}</b><br><br>

        Price: $${c.current_price}<br>
        Change: ${change.toFixed(2)}%<br><br>

        📍 Entry Zone: $${entry}<br>
        🎯 Target: $${target}<br><br>

        Score: ${score.toFixed(1)}<br>
        <span class="${color}">${signal}</span>
      </div>
    `;
  });

  document.getElementById("coins").innerHTML = html;
}

load();
setInterval(load, 20000);

</script>

</body>
</html>
