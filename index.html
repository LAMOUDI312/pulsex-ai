<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulseX AI Custom Signals</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header{
  background:black;
  padding:18px;
  text-align:center;
  color:#00ff88;
  font-size:20px;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:#141a2b;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
}

.green{color:#00ff88;}
.orange{color:orange;}
.red{color:#ff4d4d;}
.small{color:gray;font-size:12px;}
</style>
</head>

<body>

<header>
PulseX AI 🚀 Custom 6 Coins Analysis
</header>

<div class="container" id="app">Loading...</div>

<script>

const coins = ["WAI","SENTIS","WBAI","ST","TA","TTD"];

function analyze(name){

  // fake but logical scoring model
  let volatility = Math.random()*100;
  let momentum = Math.random()*100;

  let score = (volatility*0.5 + momentum*0.5);

  let price = (Math.random()*0.01 + 0.0001).toFixed(6);
  let entry = (price * (1 - Math.random()*0.05)).toFixed(6);
  let target = (price * (1 + Math.random()*0.08)).toFixed(6);

  let time = Math.floor(Math.random()*48+1); // hours estimate

  let signal = "";
  let color = "";

  if(score > 70){
    signal = "🚀 Strong Momentum";
    color = "green";
  }
  else if(score > 50){
    signal = "⚡ Watch Zone";
    color = "orange";
  }
  else{
    signal = "⚠️ Weak Structure";
    color = "red";
  }

  return `
    <div class="card">
      <b>${name}</b><br><br>

      Price: $${price}<br>
      📍 Entry: $${entry}<br>
      🎯 Target: $${target}<br>
      ⏱ Move: ~${time}h<br><br>

      Score: ${score.toFixed(1)}<br>
      <span class="${color}">${signal}</span><br>

      <div class="small">*Probabilistic AI simulation, not financial advice</div>
    </div>
  `;
}

function load(){

  let html = "";

  coins.forEach(c=>{
    html += analyze(c);
  });

  document.getElementById("app").innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
